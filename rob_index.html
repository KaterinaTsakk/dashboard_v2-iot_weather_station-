<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Smart Weather AI</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>



\*{

box-sizing:border-box;

font-family:"Segoe UI",Arial;

}



body{



margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;



background:

linear-gradient(135deg,#74ebd5,#9face6);



}





.app{



width:380px;

padding:25px;



}





.header{



display:flex;

justify-content:space-between;

align-items:center;

color:white;



}





.title{



font-size:28px;

font-weight:700;



}





.live{



display:flex;

align-items:center;

gap:8px;

font-weight:bold;



}





.dot{



width:14px;

height:14px;

border-radius:50%;

background:red;

transition:.4s;



}







.card{



background:rgba(255,255,255,.25);

backdrop-filter:blur(15px);



border-radius:30px;



padding:25px;



margin-top:20px;



box-shadow:

0 15px 35px rgba(0,0,0,.2);



color:white;



}







.icon{



font-size:70px;

text-align:center;



}







.temp{



font-size:75px;

font-weight:800;

text-align:center;



color:#fff;



}







.center{



text-align:center;



}







.stats{



display:flex;

gap:15px;



}







.box{



flex:1;



background:rgba(255,255,255,.2);



padding:15px;



border-radius:20px;



text-align:center;



}







.number{



font-size:32px;

font-weight:bold;



}







.label{



opacity:.8;



}







.comfort{



text-align:center;

font-size:22px;

margin-top:15px;



}







.ai{



background:rgba(0,0,0,.15);



border-radius:20px;



padding:18px;



line-height:1.5;



}







.time{



margin-top:15px;

text-align:center;

opacity:.8;



}






</head>


<body>


<div class="app">


<div class="header">

<div class="title">
🌤 Weather AI
</div>


<div class="live">

<div class="dot" id="dot"></div>

LIVE

</div>

</div>



<div class="card">


<div class="icon" id="icon">
☀️
</div>


<div class="temp">

<span id="temp">--</span>°

</div>


<div class="center">
Smart IoT Station
</div>



<div class="stats">


<div class="box">

<div class="label">
💧 Humidity
</div>

<div class="number" id="hum">
--
</div>

</div>



<div class="box">

<div class="label">
😊 Comfort
</div>

<div class="number" id="comfort">
--
</div>

</div>


</div>


<div class="time" id="time">

Waiting data...

</div>


</div>




<div class="card">


<h2>
🤖 AI Forecast
</h2>


<div class="ai" id="forecast">

Waiting for AI report...

</div>


</div>


</div>



<script>





const USER="katerina";





const weatherTopic=

`robotonio/${USER}/weather`;



const aiTopic=

`robotonio/${USER}/ai\_report`;







const client=mqtt.connect(

"wss://test.mosquitto.org:8081/mqtt"

);







const dot=document.getElementById("dot");







client.on("connect",()=>{





dot.style.background="#00ff88";

dot.style.boxShadow="0 0 20px #00ff88";





client.subscribe(weatherTopic);

client.subscribe(aiTopic);





});







client.on("close",()=>{





dot.style.background="red";





});









client.on("message",(topic,msg)=>{





if(topic===weatherTopic){





let d=JSON.parse(msg);





temp.innerHTML=d.temp;



hum.innerHTML=d.hum+"%";



comfort.innerHTML=d.comfort;





time.innerHTML=

"Updated "+

new Date().toLocaleTimeString();





if(d.temp<15)

icon.innerHTML="❄️";



else if(d.temp<28)

icon.innerHTML="🌤️";



else

icon.innerHTML="☀️";





}







if(topic===aiTopic){



forecast.innerHTML=

msg.toString();



}





});









</body>
</html>
